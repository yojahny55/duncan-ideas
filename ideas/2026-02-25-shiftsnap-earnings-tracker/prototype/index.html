<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ShiftSnap - Know What You Earned</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <span class="logo">💵</span>
                <span class="app-name">ShiftSnap</span>
            </div>
            <div class="header-right">
                <button class="icon-btn" id="settingsBtn">⚙️</button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main">
            <!-- Today's Summary Card -->
            <section class="today-card">
                <div class="today-label">Today's Earnings</div>
                <div class="today-amount" id="todayAmount">$0.00</div>
                <div class="today-detail" id="todayDetail">Start your first shift →</div>
            </section>

            <!-- Quick Clock Button -->
            <section class="clock-section">
                <button class="clock-btn" id="clockBtn">
                    <span class="clock-icon" id="clockIcon">▶</span>
                    <span class="clock-text" id="clockText">Clock In</span>
                </button>
                <div class="shift-timer" id="shiftTimer" style="display: none;">
                    <span id="timerDisplay">00:00:00</span>
                </div>
            </section>

            <!-- Week Overview -->
            <section class="week-section">
                <div class="section-header">
                    <h2>This Week</h2>
                    <span class="week-total" id="weekTotal">$0.00</span>
                </div>
                <div class="week-bars" id="weekBars">
                    <!-- Generated by JS -->
                </div>
                <div class="week-stats">
                    <div class="stat">
                        <span class="stat-value" id="hoursWorked">0h</span>
                        <span class="stat-label">Hours</span>
                    </div>
                    <div class="stat">
                        <span class="stat-value" id="avgHourly">$0</span>
                        <span class="stat-label">Avg/hr</span>
                    </div>
                    <div class="stat">
                        <span class="stat-value" id="tipsTotal">$0</span>
                        <span class="stat-label">Tips</span>
                    </div>
                </div>
            </section>

            <!-- Recent Shifts -->
            <section class="shifts-section">
                <div class="section-header">
                    <h2>Recent Shifts</h2>
                    <button class="text-btn" id="viewAllBtn">View All</button>
                </div>
                <div class="shifts-list" id="shiftsList">
                    <!-- Generated by JS -->
                </div>
            </section>
        </main>

        <!-- Navigation -->
        <nav class="nav">
            <button class="nav-item active" data-view="home">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Home</span>
            </button>
            <button class="nav-item" data-view="history">
                <span class="nav-icon">📅</span>
                <span class="nav-label">History</span>
            </button>
            <button class="nav-item" data-view="paycheck">
                <span class="nav-icon">✅</span>
                <span class="nav-label">Paycheck</span>
            </button>
            <button class="nav-item" data-view="insights">
                <span class="nav-icon">📊</span>
                <span class="nav-label">Insights</span>
            </button>
        </nav>

        <!-- Modals -->
        <!-- Clock Out Modal -->
        <div class="modal" id="clockOutModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Shift Complete! 🎉</h2>
                    <button class="close-btn" id="closeClockOut">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="shift-summary">
                        <div class="shift-time" id="shiftTimeDisplay">4h 32m</div>
                        <div class="shift-hours-detail" id="shiftHoursDetail">Regular: 4.5h</div>
                    </div>
                    
                    <div class="tip-entry">
                        <label>Cash Tips</label>
                        <div class="input-group">
                            <span class="input-prefix">$</span>
                            <input type="number" id="cashTips" placeholder="0.00" step="0.01">
                        </div>
                    </div>
                    
                    <div class="tip-entry">
                        <label>Credit Card Tips</label>
                        <div class="input-group">
                            <span class="input-prefix">$</span>
                            <input type="number" id="creditTips" placeholder="0.00" step="0.01">
                        </div>
                    </div>
                    
                    <div class="tip-entry">
                        <label>Tip Out (to others)</label>
                        <div class="input-group">
                            <span class="input-prefix">$</span>
                            <input type="number" id="tipOut" placeholder="0.00" step="0.01">
                        </div>
                    </div>

                    <div class="earnings-preview">
                        <div class="earnings-row">
                            <span>Hourly Pay</span>
                            <span id="hourlyPayPreview">$0.00</span>
                        </div>
                        <div class="earnings-row">
                            <span>Tips (net)</span>
                            <span id="tipsPreview">$0.00</span>
                        </div>
                        <div class="earnings-row total">
                            <span>Gross Total</span>
                            <span id="grossTotal">$0.00</span>
                        </div>
                        <div class="earnings-row net">
                            <span>~Take Home</span>
                            <span id="netTotal">$0.00</span>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-primary" id="saveShift">Save Shift</button>
                </div>
            </div>
        </div>

        <!-- Settings Modal -->
        <div class="modal" id="settingsModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Settings</h2>
                    <button class="close-btn" id="closeSettings">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="setting-group">
                        <label>Hourly Rate</label>
                        <div class="input-group">
                            <span class="input-prefix">$</span>
                            <input type="number" id="hourlyRate" placeholder="15.00" step="0.25" value="18.00">
                        </div>
                    </div>
                    
                    <div class="setting-group">
                        <label>Overtime Rate</label>
                        <select id="overtimeRate">
                            <option value="1.5">1.5x (Time and a half)</option>
                            <option value="2">2x (Double time)</option>
                        </select>
                    </div>
                    
                    <div class="setting-group">
                        <label>Weekly Hours Before OT</label>
                        <div class="input-group">
                            <input type="number" id="otThreshold" value="40">
                            <span class="input-suffix">hrs</span>
                        </div>
                    </div>

                    <div class="setting-group">
                        <label>Estimated Tax Rate</label>
                        <div class="input-group">
                            <input type="number" id="taxRate" value="22" min="0" max="50">
                            <span class="input-suffix">%</span>
                        </div>
                    </div>

                    <div class="setting-group">
                        <label>Night Differential (+)</label>
                        <div class="input-group">
                            <span class="input-prefix">$</span>
                            <input type="number" id="nightDiff" placeholder="0.00" step="0.25" value="0">
                            <span class="input-suffix">/hr</span>
                        </div>
                    </div>

                    <div class="setting-group">
                        <label>Weekend Differential (+)</label>
                        <div class="input-group">
                            <span class="input-prefix">$</span>
                            <input type="number" id="weekendDiff" placeholder="0.00" step="0.25" value="0">
                            <span class="input-suffix">/hr</span>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-primary" id="saveSettings">Save Settings</button>
                </div>
            </div>
        </div>

        <!-- Success Toast -->
        <div class="toast" id="toast">
            <span class="toast-icon">✅</span>
            <span class="toast-message" id="toastMessage">Shift saved!</span>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
