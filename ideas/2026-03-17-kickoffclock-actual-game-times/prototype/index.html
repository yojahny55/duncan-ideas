<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KickoffClock — Know When Games Actually Start</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <span class="logo">⏱️</span>
        <h1 class="app-name">KickoffClock</h1>
      </div>
      <div class="header-right">
        <button class="icon-btn" id="notif-btn" title="Notifications">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="notif-badge" id="notif-badge">3</span>
        </button>
        <button class="icon-btn" id="settings-btn" title="Settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </button>
      </div>
    </header>

    <!-- Date Nav -->
    <div class="date-nav">
      <button class="date-arrow" id="prev-day">‹</button>
      <div class="date-tabs" id="date-tabs"></div>
      <button class="date-arrow" id="next-day">›</button>
    </div>

    <!-- Sport Filter -->
    <div class="sport-filter" id="sport-filter">
      <button class="sport-chip active" data-sport="all">All</button>
      <button class="sport-chip" data-sport="nfl">🏈 NFL</button>
      <button class="sport-chip" data-sport="nba">🏀 NBA</button>
      <button class="sport-chip" data-sport="mlb">⚾ MLB</button>
      <button class="sport-chip" data-sport="nhl">🏒 NHL</button>
      <button class="sport-chip" data-sport="mls">⚽ MLS</button>
      <button class="sport-chip" data-sport="ufc">🥊 UFC</button>
    </div>

    <!-- Games List -->
    <div class="games-list" id="games-list"></div>

    <!-- Game Detail Modal -->
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal" id="game-modal">
        <button class="modal-close" id="modal-close">✕</button>
        <div id="modal-content"></div>
      </div>
    </div>

    <!-- Notification Toast -->
    <div class="toast" id="toast"></div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-view="today">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.5-13H11v6l5.2 3.2.8-1.3-4.5-2.7V7z"/></svg>
        <span>Today</span>
      </button>
      <button class="nav-item" data-view="my-teams">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        <span>My Teams</span>
      </button>
      <button class="nav-item" data-view="stats">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
        <span>Delay Stats</span>
      </button>
      <button class="nav-item" data-view="report">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12zM11 5h2v4h-2zm0 6h2v2h-2z"/></svg>
        <span>Report</span>
      </button>
    </nav>
  </div>

  <!-- Stats View (hidden by default) -->
  <template id="stats-template">
    <div class="stats-view">
      <h2 class="section-title">⏱️ Delay Leaderboard</h2>
      <p class="section-subtitle">Which leagues are the worst offenders?</p>
      <div class="delay-chart" id="delay-chart"></div>
      <h2 class="section-title" style="margin-top: 24px;">📺 Network Delays</h2>
      <div class="network-delays" id="network-delays"></div>
    </div>
  </template>

  <!-- Report View (hidden by default) -->
  <template id="report-template">
    <div class="report-view">
      <h2 class="section-title">📡 Live Report</h2>
      <p class="section-subtitle">Help everyone know when the action starts</p>
      <div class="report-game-select" id="report-game-select"></div>
      <div class="report-milestones" id="report-milestones"></div>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
