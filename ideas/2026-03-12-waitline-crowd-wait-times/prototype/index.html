<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WaitLine — Real-Time Wait Times</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-top">
        <div class="logo">
          <span class="logo-icon">⏱️</span>
          <span class="logo-text">WaitLine</span>
        </div>
        <div class="header-actions">
          <button class="icon-btn" id="alertBtn" title="Alerts">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span class="badge">3</span>
          </button>
          <button class="icon-btn" id="profileBtn" title="Profile">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </button>
        </div>
      </div>
      <div class="search-bar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="searchInput" placeholder="Search places near you...">
      </div>
    </header>

    <!-- Category Pills -->
    <div class="categories">
      <button class="cat-pill active" data-cat="all">All</button>
      <button class="cat-pill" data-cat="food">🍽️ Food</button>
      <button class="cat-pill" data-cat="gov">🏛️ Gov</button>
      <button class="cat-pill" data-cat="health">🏥 Health</button>
      <button class="cat-pill" data-cat="travel">✈️ Travel</button>
      <button class="cat-pill" data-cat="services">🏦 Services</button>
      <button class="cat-pill" data-cat="fun">🎢 Fun</button>
    </div>

    <!-- Main Content -->
    <main class="content" id="mainContent">
      <!-- Map View -->
      <div class="map-container" id="mapView">
        <div class="map-placeholder">
          <div class="map-bg">
            <div class="map-pin green" style="top:25%;left:30%">
              <span class="pin-wait">5m</span>
            </div>
            <div class="map-pin yellow" style="top:40%;left:55%">
              <span class="pin-wait">22m</span>
            </div>
            <div class="map-pin red" style="top:60%;left:35%">
              <span class="pin-wait">55m</span>
            </div>
            <div class="map-pin green" style="top:35%;left:72%">
              <span class="pin-wait">8m</span>
            </div>
            <div class="map-pin yellow" style="top:70%;left:65%">
              <span class="pin-wait">30m</span>
            </div>
            <div class="map-pin red" style="top:20%;left:60%">
              <span class="pin-wait">45m</span>
            </div>
          </div>
          <div class="map-legend">
            <span class="legend-item"><span class="dot green"></span> &lt;15 min</span>
            <span class="legend-item"><span class="dot yellow"></span> 15-30 min</span>
            <span class="legend-item"><span class="dot red"></span> 30+ min</span>
          </div>
        </div>
      </div>

      <!-- Venue List -->
      <div class="section-header">
        <h2>Near You</h2>
        <button class="sort-btn" id="sortBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M6 12h12M9 18h6"/></svg>
          Shortest wait
        </button>
      </div>

      <div class="venue-list" id="venueList">
        <!-- Venues injected by JS -->
      </div>
    </main>

    <!-- Venue Detail Modal -->
    <div class="modal-overlay" id="venueModal">
      <div class="modal">
        <button class="modal-close" id="modalClose">&times;</button>
        <div class="modal-content" id="modalContent">
          <!-- Filled by JS -->
        </div>
      </div>
    </div>

    <!-- Report Wait Modal -->
    <div class="modal-overlay" id="reportModal">
      <div class="modal report-modal">
        <button class="modal-close" id="reportClose">&times;</button>
        <div class="report-content">
          <h2>Report Wait Time</h2>
          <p class="report-venue-name" id="reportVenueName"></p>
          <div class="report-method-tabs">
            <button class="report-tab active" data-method="quick">Quick Report</button>
            <button class="report-tab" data-method="timer">Timer</button>
          </div>
          <div class="report-quick" id="reportQuick">
            <p class="report-label">How long is the wait right now?</p>
            <div class="wait-slider-container">
              <input type="range" min="0" max="120" value="15" class="wait-slider" id="waitSlider">
              <div class="wait-slider-value" id="waitSliderValue">15 min</div>
            </div>
            <div class="quick-presets">
              <button class="preset-btn" data-min="5">5 min</button>
              <button class="preset-btn" data-min="10">10 min</button>
              <button class="preset-btn" data-min="15">15 min</button>
              <button class="preset-btn" data-min="30">30 min</button>
              <button class="preset-btn" data-min="45">45 min</button>
              <button class="preset-btn" data-min="60">1 hr</button>
              <button class="preset-btn" data-min="90">1.5 hr</button>
              <button class="preset-btn" data-min="120">2+ hr</button>
            </div>
            <div class="gps-verify">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              <span>GPS verified — you're at this location</span>
            </div>
            <button class="submit-report-btn" id="submitReport">Submit Report</button>
          </div>
          <div class="report-timer hidden" id="reportTimer">
            <p class="report-label">Start when you arrive, stop when you're served</p>
            <div class="timer-display" id="timerDisplay">00:00</div>
            <div class="timer-btns">
              <button class="timer-btn start" id="timerStart">Start Timer</button>
              <button class="timer-btn stop hidden" id="timerStop">I'm Being Served</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Success Toast -->
    <div class="toast" id="toast">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      <span id="toastMsg">Report submitted! +10 XP</span>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-view="explore">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
        <span>Explore</span>
      </button>
      <button class="nav-item" data-view="map">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
        <span>Map</span>
      </button>
      <button class="nav-item report-nav" id="reportNavBtn">
        <div class="report-fab">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        </div>
        <span>Report</span>
      </button>
      <button class="nav-item" data-view="alerts">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span>Alerts</span>
      </button>
      <button class="nav-item" data-view="profile">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>You</span>
      </button>
    </nav>
  </div>

  <script src="app.js"></script>
</body>
</html>
