<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradeCal — Scheduling Built for Trades</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <button class="menu-btn" aria-label="Menu">
          <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12h18M3 6h18M3 18h18"/>
          </svg>
        </button>
        <h1 class="logo">TradeCal</h1>
      </div>
      <div class="header-right">
        <div class="tech-badge">
          <div class="tech-avatar">JM</div>
          <span class="tech-name">Jake M.</span>
        </div>
      </div>
    </header>

    <!-- Date Nav -->
    <div class="date-nav">
      <button class="date-nav-btn" id="prevDay">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>
      <div class="date-display">
        <span class="date-day" id="dateDay">Tuesday</span>
        <span class="date-full" id="dateFull">March 11, 2026</span>
      </div>
      <button class="date-nav-btn" id="nextDay">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 18l6-6-6-6"/>
        </svg>
      </button>
    </div>

    <!-- Day Summary -->
    <div class="day-summary">
      <div class="summary-stat">
        <span class="stat-value" id="jobCount">4</span>
        <span class="stat-label">Jobs</span>
      </div>
      <div class="summary-divider"></div>
      <div class="summary-stat">
        <span class="stat-value" id="totalHours">6.5h</span>
        <span class="stat-label">Work</span>
      </div>
      <div class="summary-divider"></div>
      <div class="summary-stat">
        <span class="stat-value" id="driveTime">1.2h</span>
        <span class="stat-label">Drive</span>
      </div>
      <div class="summary-divider"></div>
      <div class="summary-stat">
        <span class="stat-value" id="totalMiles">47mi</span>
        <span class="stat-label">Miles</span>
      </div>
    </div>

    <!-- Schedule -->
    <div class="schedule" id="schedule">
      <!-- Jobs will be rendered here -->
    </div>

    <!-- Add Job FAB -->
    <button class="fab" id="addJobBtn" aria-label="Add Job">
      <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M14 5v18M5 14h18"/>
      </svg>
    </button>

    <!-- Add Job Modal -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal" id="addJobModal">
        <div class="modal-header">
          <h2>Add Job</h2>
          <button class="modal-close" id="closeModal">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 6L6 18M6 6l12 12"/>
            </svg>
          </button>
        </div>
        <form class="job-form" id="jobForm">
          <div class="form-group">
            <label for="jobType">Job Type</label>
            <select id="jobType" required>
              <option value="">Select type...</option>
              <option value="service">Service Call</option>
              <option value="install">Installation</option>
              <option value="estimate">Estimate</option>
              <option value="inspection">Inspection</option>
              <option value="repair">Repair</option>
            </select>
          </div>
          <div class="form-group">
            <label for="customerName">Customer Name</label>
            <input type="text" id="customerName" placeholder="e.g., Johnson Residence" required>
          </div>
          <div class="form-group">
            <label for="address">Address</label>
            <input type="text" id="address" placeholder="e.g., 1234 Oak St, Tampa" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="arrivalWindow">Arrival Window</label>
              <select id="arrivalWindow" required>
                <option value="8-10">8:00 - 10:00 AM</option>
                <option value="10-12">10:00 AM - 12:00 PM</option>
                <option value="12-2">12:00 - 2:00 PM</option>
                <option value="2-4">2:00 - 4:00 PM</option>
                <option value="4-6">4:00 - 6:00 PM</option>
              </select>
            </div>
            <div class="form-group">
              <label for="duration">Duration</label>
              <select id="duration" required>
                <option value="30">30 min</option>
                <option value="60" selected>1 hour</option>
                <option value="90">1.5 hours</option>
                <option value="120">2 hours</option>
                <option value="180">3 hours</option>
                <option value="240">4 hours</option>
                <option value="480">Full day</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label for="notes">Notes</label>
            <textarea id="notes" rows="2" placeholder="e.g., Gate code: 1234, Dog in backyard"></textarea>
          </div>
          <button type="submit" class="btn-primary">Add Job</button>
        </form>
      </div>
    </div>

    <!-- Job Detail Modal -->
    <div class="modal-overlay" id="jobDetailOverlay">
      <div class="modal job-detail-modal" id="jobDetailModal">
        <div class="modal-header">
          <h2 id="jobDetailTitle">Job Details</h2>
          <button class="modal-close" id="closeJobDetail">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 6L6 18M6 6l12 12"/>
            </svg>
          </button>
        </div>
        <div class="job-detail-content" id="jobDetailContent">
          <!-- Dynamic content -->
        </div>
        <div class="job-detail-actions">
          <button class="btn-secondary" id="notifyCustomerBtn">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
            </svg>
            Notify Customer
          </button>
          <button class="btn-primary" id="startJobBtn">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
            Start Job
          </button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
      <span class="toast-message" id="toastMessage"></span>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
