<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SubZero — Subscription Sandbox</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0a0a0f;--surface:#12121a;--card:#1a1a26;--border:#2a2a3a;
    --accent:#00d4ff;--accent2:#7c3aed;--danger:#ef4444;--success:#22c55e;
    --text:#e4e4e7;--muted:#71717a;--dim:#52525b;
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  
  .header{text-align:center;padding:2rem 1rem 1rem;position:relative}
  .header h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-1px}
  .header p{color:var(--muted);font-size:.95rem;margin-top:.25rem}
  .header .tag{display:inline-block;background:var(--card);border:1px solid var(--border);padding:.2rem .6rem;border-radius:999px;font-size:.7rem;color:var(--accent);margin-top:.5rem}

  .stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;max-width:700px;margin:1rem auto;padding:0 1rem}
  .stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem;text-align:center}
  .stat .label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .stat .value{font-size:1.6rem;font-weight:700;margin-top:.25rem}
  .stat .value.danger{color:var(--danger)}
  .stat .value.saved{color:var(--success)}
  .stat .value.total{color:var(--accent)}

  .sandbox-bar{max-width:700px;margin:1rem auto;padding:0 1rem;display:flex;align-items:center;justify-content:space-between}
  .sandbox-bar span{font-size:.85rem;color:var(--muted)}
  .scenario-btns{display:flex;gap:.5rem}
  .scenario-btns button{background:var(--card);border:1px solid var(--border);color:var(--text);padding:.4rem .8rem;border-radius:8px;cursor:pointer;font-size:.75rem}
  .scenario-btns button.active{border-color:var(--accent);color:var(--accent)}

  .subs-list{max-width:700px;margin:1rem auto;padding:0 1rem}
  .sub-item{display:flex;align-items:center;gap:.75rem;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.85rem 1rem;margin-bottom:.5rem;transition:all .3s;position:relative;overflow:hidden}
  .sub-item.off{opacity:.45;border-color:transparent}
  .sub-item.off .sub-price{text-decoration:line-through;color:var(--dim)}
  
  .toggle{width:44px;height:24px;border-radius:12px;background:var(--border);cursor:pointer;position:relative;flex-shrink:0;transition:background .3s}
  .toggle.on{background:var(--success)}
  .toggle::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform .3s}
  .toggle.on::after{transform:translateX(20px)}

  .sub-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
  .sub-info{flex:1;min-width:0}
  .sub-name{font-weight:600;font-size:.9rem}
  .sub-cat{font-size:.7rem;color:var(--muted)}
  .sub-price{font-weight:700;font-size:.95rem;white-space:nowrap}

  .projection{max-width:700px;margin:1.5rem auto;padding:0 1rem}
  .proj-card{background:linear-gradient(135deg,rgba(0,212,255,.1),rgba(124,58,237,.1));border:1px solid var(--border);border-radius:16px;padding:1.5rem;text-align:center}
  .proj-card h3{font-size:.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.5rem}
  .proj-amount{font-size:2.8rem;font-weight:800;color:var(--success)}
  .proj-label{font-size:.85rem;color:var(--muted);margin-top:.25rem}
  .proj-bar{height:8px;background:var(--border);border-radius:4px;margin-top:1rem;overflow:hidden}
  .proj-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--success));border-radius:4px;transition:width .5s}

  .add-form{max-width:700px;margin:1rem auto;padding:0 1rem}
  .add-btn{width:100%;background:var(--card);border:2px dashed var(--border);border-radius:12px;padding:.85rem;color:var(--muted);cursor:pointer;font-size:.9rem;transition:all .2s}
  .add-btn:hover{border-color:var(--accent);color:var(--accent)}
  .form-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem;margin-top:.5rem}
  .form-row input,.form-row select{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.5rem .75rem;color:var(--text);font-size:.85rem}
  .form-row input::placeholder{color:var(--dim)}
  .form-actions{display:flex;gap:.5rem;margin-top:.5rem}
  .form-actions button{padding:.5rem 1rem;border-radius:8px;border:none;cursor:pointer;font-size:.85rem;font-weight:600}
  .btn-add{background:var(--accent);color:#000}
  .btn-cancel{background:var(--card);color:var(--text);border:1px solid var(--border)}

  .footer{text-align:center;padding:2rem;color:var(--dim);font-size:.75rem}

  @media(max-width:500px){
    .stats-bar{grid-template-columns:1fr}
    .header h1{font-size:1.8rem}
    .form-row{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<div class="header">
  <h1>SubZero</h1>
  <p>Toggle subscriptions off. See what you save.</p>
  <span class="tag">❄️ Sandbox Mode</span>
</div>

<div class="stats-bar">
  <div class="stat">
    <div class="label">Monthly Burn</div>
    <div class="value danger" id="monthly">$0</div>
  </div>
  <div class="stat">
    <div class="label">You'd Save</div>
    <div class="value saved" id="saved">$0</div>
  </div>
  <div class="stat">
    <div class="label">Yearly Total</div>
    <div class="value total" id="yearly">$0</div>
  </div>
</div>

<div class="sandbox-bar">
  <span>🔮 Scenario:</span>
  <div class="scenario-btns">
    <button class="active" onclick="loadScenario('current')">Current</button>
    <button onclick="loadScenario('aggressive')">Aggressive</button>
    <button onclick="loadScenario('streaming')">No Streaming</button>
  </div>
</div>

<div class="subs-list" id="subsList"></div>

<div class="add-form">
  <button class="add-btn" id="addBtn" onclick="showForm()">+ Add Subscription</button>
  <div id="formFields" style="display:none">
    <div class="form-row">
      <input id="fName" placeholder="Name (e.g. Netflix)">
      <input id="fPrice" type="number" step="0.01" placeholder="$ / month">
      <select id="fCat">
        <option value="Streaming">Streaming</option>
        <option value="Music">Music</option>
        <option value="Productivity">Productivity</option>
        <option value="Cloud">Cloud / Storage</option>
        <option value="Fitness">Fitness</option>
        <option value="News">News</option>
        <option value="Gaming">Gaming</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div class="form-actions">
      <button class="btn-add" onclick="addSub()">Add</button>
      <button class="btn-cancel" onclick="hideForm()">Cancel</button>
    </div>
  </div>
</div>

<div class="projection">
  <div class="proj-card">
    <h3>Projected Savings by December 2026</h3>
    <div class="proj-amount" id="projAmount">$0</div>
    <div class="proj-label" id="projLabel">by toggling off subscriptions above</div>
    <div class="proj-bar"><div class="proj-fill" id="projFill" style="width:0%"></div></div>
  </div>
</div>

<div class="footer">SubZero ⚔️ — Sandbox simulator, not another subscription.</div>

<script>
const CATS = {
  Streaming: { icon: '🎬', color: '#e11d48' },
  Music: { icon: '🎵', color: '#8b5cf6' },
  Productivity: { icon: '⚡', color: '#f59e0b' },
  Cloud: { icon: '☁️', color: '#06b6d4' },
  Fitness: { icon: '💪', color: '#22c55e' },
  News: { icon: '📰', color: '#6366f1' },
  Gaming: { icon: '🎮', color: '#ec4899' },
  Other: { icon: '📦', color: '#71717a' }
};

let subs = [
  { id:1, name:'Netflix', price:15.99, cat:'Streaming', on:true },
  { id:2, name:'Spotify', price:10.99, cat:'Music', on:true },
  { id:3, name:'iCloud+', price:2.99, cat:'Cloud', on:true },
  { id:4, name:'ChatGPT Plus', price:20.00, cat:'Productivity', on:true },
  { id:5, name:'YouTube Premium', price:13.99, cat:'Streaming', on:true },
  { id:6, name:'Gym Membership', price:29.99, cat:'Fitness', on:true },
  { id:7, name:'NYT Cooking', price:5.00, cat:'News', on:true },
  { id:8, name:'Hulu', price:17.99, cat:'Streaming', on:true },
  { id:9, name:'Notion', price:10.00, cat:'Productivity', on:true },
  { id:10, name:'Xbox Game Pass', price:16.99, cat:'Gaming', on:true },
];

let nextId = 11;

function render() {
  const list = document.getElementById('subsList');
  list.innerHTML = subs.map(s => {
    const c = CATS[s.cat] || CATS.Other;
    return `<div class="sub-item ${s.on ? '' : 'off'}">
      <div class="toggle ${s.on ? 'on' : ''}" onclick="toggle(${s.id})"></div>
      <div class="sub-icon" style="background:${c.color}22">${c.icon}</div>
      <div class="sub-info">
        <div class="sub-name">${s.name}</div>
        <div class="sub-cat">${s.cat}</div>
      </div>
      <div class="sub-price">$${s.price.toFixed(2)}/mo</div>
    </div>`;
  }).join('');
  updateStats();
}

function toggle(id) {
  const s = subs.find(x => x.id === id);
  if (s) s.on = !s.on;
  render();
}

function updateStats() {
  const total = subs.reduce((a, s) => a + s.price, 0);
  const active = subs.filter(s => s.on).reduce((a, s) => a + s.price, 0);
  const saved = total - active;

  document.getElementById('monthly').textContent = `$${active.toFixed(2)}`;
  document.getElementById('saved').textContent = `$${saved.toFixed(2)}`;
  document.getElementById('yearly').textContent = `$${(active * 12).toFixed(0)}`;

  // Projection: savings through Dec 2026 (8 months from April)
  const projSave = saved * 8;
  document.getElementById('projAmount').textContent = `$${projSave.toFixed(0)}`;
  const pct = total > 0 ? Math.min((saved / total) * 100, 100) : 0;
  document.getElementById('projFill').style.width = pct + '%';
  document.getElementById('projLabel').textContent = 
    saved > 0 ? `by canceling ${subs.filter(s=>!s.on).length} subscription${subs.filter(s=>!s.on).length!==1?'s':''} starting now` : 'toggle subscriptions off above to see savings';
}

function showForm() {
  document.getElementById('addBtn').style.display = 'none';
  document.getElementById('formFields').style.display = 'block';
  document.getElementById('fName').focus();
}
function hideForm() {
  document.getElementById('addBtn').style.display = 'block';
  document.getElementById('formFields').style.display = 'none';
  document.getElementById('fName').value = '';
  document.getElementById('fPrice').value = '';
}

function addSub() {
  const name = document.getElementById('fName').value.trim();
  const price = parseFloat(document.getElementById('fPrice').value);
  const cat = document.getElementById('fCat').value;
  if (!name || isNaN(price) || price <= 0) return;
  subs.push({ id: nextId++, name, price, cat, on: true });
  hideForm();
  render();
}

function loadScenario(type) {
  document.querySelectorAll('.scenario-btns button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  
  if (type === 'current') {
    subs.forEach(s => s.on = true);
  } else if (type === 'aggressive') {
    subs.forEach(s => s.on = ['Music','Cloud'].includes(s.cat));
  } else if (type === 'streaming') {
    subs.forEach(s => s.on = s.cat !== 'Streaming');
  }
  render();
}

render();
</script>
</body>
</html>
